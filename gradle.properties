kotlin.code.style = official
org.gradle.jvmargs = -Xmx4g -Dfile.encoding=UTF-8
org.gradle.parallel = true
org.gradle.caching = true
org.gradle.configuration-cache = true
org.jetbrains.dokka.experimental.gradle.pluginMode = V2EnabledWithHelpers
# Semantic-release (open-turo/actions-jvm/release) bumps this line on
# every release. Gradle automatically picks up `version` from
# gradle.properties and assigns it to Project.version for every
# subproject, so published artifacts always track the released tag.
version = 5.2.4
