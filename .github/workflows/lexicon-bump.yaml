name: Lexicon bump

# Detect upstream @atproto/lex drift on a schedule and open a PR with
# the bumped npm version, refreshed lexicons.json CIDs, and validated
# generator output. Manual workflow_dispatch lets a maintainer trigger
# an ad-hoc bump from the Actions tab.

on:
  schedule:
    # 14:00 UTC Mondays → 7am PT, leaves the week to review the bump PR
    - cron: "0 14 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    name: Bump @atproto/lex
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          # Use a PAT (not GITHUB_TOKEN) so the PR opened below triggers
          # CI on its own branch — GitHub suppresses workflow runs for
          # commits made via the default token.
          token: ${{ secrets.RELEASE_PAT }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: generator/package-lock.json

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version-file: .java-version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Snapshot pre-bump state
        id: pre
        working-directory: generator
        run: |
          set -euo pipefail
          old_version=$(jq -r '.dependencies["@atproto/lex"]' package.json)
          echo "old_version=$old_version" >> "$GITHUB_OUTPUT"
          cp lexicons.json "$RUNNER_TEMP/lexicons.before.json"

      - name: Bump @atproto/lex to latest
        working-directory: generator
        run: npm install @atproto/lex@latest --save-exact

      - name: Refresh lexicon corpus
        working-directory: generator
        # No --ci flag here: we want lex install to rewrite lexicons.json
        # against whatever the newly-installed @atproto/lex package ships.
        run: npx lex install

      - name: Regenerate models
        # Validates the new corpus compiles end-to-end before opening the
        # PR. CI on the PR re-runs this, but failing here saves a noisy
        # red PR for the maintainer.
        run: ./gradlew :generator:generateModels --no-configuration-cache

      - name: Detect changes
        id: diff
        run: |
          set -euo pipefail
          changed=false
          for f in generator/package.json generator/package-lock.json generator/lexicons.json; do
            if ! git diff --quiet -- "$f"; then
              changed=true
              break
            fi
          done
          echo "changes=$changed" >> "$GITHUB_OUTPUT"

      - name: Capture post-bump version
        id: post
        if: steps.diff.outputs.changes == 'true'
        working-directory: generator
        run: |
          set -euo pipefail
          new_version=$(jq -r '.dependencies["@atproto/lex"]' package.json)
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Build PR body
        id: body
        if: steps.diff.outputs.changes == 'true'
        env:
          OLD_VERSION: ${{ steps.pre.outputs.old_version }}
          NEW_VERSION: ${{ steps.post.outputs.new_version }}
        run: |
          set -euo pipefail

          # CID-level diff of the resolutions map. lexicons.json shape:
          #   { version, lexicons: [NSID...], resolutions: { NSID: {uri,cid} } }
          # The CID is what changes when upstream republishes a lexicon.
          diff_json=$(jq -n \
            --slurpfile b "$RUNNER_TEMP/lexicons.before.json" \
            --slurpfile a generator/lexicons.json '
              ($b[0].resolutions // {}) as $br
              | ($a[0].resolutions // {}) as $ar
              | ($br | keys) as $bk
              | ($ar | keys) as $ak
              | {
                  added: ($ak - $bk),
                  removed: ($bk - $ak),
                  updated: (($ak - ($ak - $bk)) | map(select($ar[.].cid != $br[.].cid)))
                }
            ')

          format_section() {
            local label="$1"
            local key="$2"
            local count
            count=$(echo "$diff_json" | jq ".${key} | length")
            echo "**${label}** (${count}):"
            if [ "$count" -gt 0 ]; then
              echo "$diff_json" | jq -r ".${key} | .[0:20] | .[] | \"- \`\" + . + \"\`\""
              if [ "$count" -gt 20 ]; then
                echo "- _…and $((count - 20)) more_"
              fi
            else
              echo "- _(none)_"
            fi
            echo
          }

          {
            echo "## Lexicon corpus update"
            echo
            echo "Bumps \`@atproto/lex\` from \`${OLD_VERSION}\` to \`${NEW_VERSION}\`."
            echo
            echo "### lexicons.json changes"
            echo
            format_section "Added" "added"
            format_section "Removed" "removed"
            format_section "Updated" "updated"
            echo "### What reviewers should check"
            echo
            echo "- [ ] CI passes (generator regeneration, runtime tests, sample APK build)"
            echo "- [ ] Skim the generator golden-file diff if any generator logic was affected"
            echo "- [ ] Verify no new lexicon references are missing Kotlin types (compile failure in \`:models\`)"
            echo
            echo "### Release impact"
            echo
            echo "If this PR merges with only additive changes (new types, new fields), expect a \`feat:\` release. If it removes or renames anything, expect a \`BREAKING CHANGE:\` release — update the PR title to \`feat!: bump @atproto/lex to <version>\` before merging."
          } > "$RUNNER_TEMP/pr_body.md"

          {
            echo 'body<<PR_BODY_EOF'
            cat "$RUNNER_TEMP/pr_body.md"
            echo 'PR_BODY_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Open or update bump PR
        if: steps.diff.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.RELEASE_PAT }}
          base: main
          # Stable branch — successive runs update the same PR rather than
          # piling up stale ones for older versions.
          branch: chore/lexicon-bump
          delete-branch: false
          title: "chore(lexicons): bump @atproto/lex to ${{ steps.post.outputs.new_version }}"
          body: ${{ steps.body.outputs.body }}
          labels: |
            lexicon-bump
            dependencies
          commit-message: |
            chore(lexicons): bump @atproto/lex to ${{ steps.post.outputs.new_version }}

            Refresh lexicons.json against @atproto/lex@${{ steps.post.outputs.new_version }}
            and regenerate Kotlin models.
