name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Action lint
        uses: open-turo/actions-jvm/lint@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          checkout-repo: true

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version-file: .java-version

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Spotless check
        run: ./gradlew spotlessCheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version-file: .java-version

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: at-protocol-generator/package-lock.json

      # Restore the pinned @atproto/lex corpus. `lex install --ci` verifies
      # every CID in lexicons.json so the build is reproducible — if an
      # upstream lexicon has drifted from its committed CID, CI fails loud.
      - name: Install lexicon corpus
        working-directory: at-protocol-generator
        run: |
          npm ci
          npx lex install --ci

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Runtime + generator tests
        run: ./gradlew :at-protocol-runtime:jvmTest :at-protocol-generator:test

      - name: Android sample unit tests
        run: ./gradlew :samples:android:testDebugUnitTest

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version-file: .java-version

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: at-protocol-generator/package-lock.json

      - name: Install lexicon corpus
        working-directory: at-protocol-generator
        run: |
          npm ci
          npx lex install --ci

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      # JVM-only build on Linux. iOS targets need macOS runners — add
      # a separate job for `linkDebugFrameworkIos*` tasks when there's
      # a real need.
      - name: Compile library (JVM)
        run: ./gradlew :at-protocol-runtime:compileKotlinJvm :at-protocol-models:compileKotlinJvm

      - name: Build Android sample APK
        run: ./gradlew :samples:android:assembleDebug
