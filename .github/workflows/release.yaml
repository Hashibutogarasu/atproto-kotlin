name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]

# Serialize release runs so the docs auto-commit step doesn't race other runs'
# pushes to main. Renovate's split-bundle config can land several PRs in quick
# succession, and each one triggers this workflow — without serialization the
# stefanzweifel/git-auto-commit-action push fails non-fast-forward.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  # ── Gate jobs ──────────────────────────────────────────────────────
  # Mirror the lint/test/build checks from ci.yaml so no broken code
  # can reach the release + publish steps. Pattern from open-turo/nibel.

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Action lint
        uses: open-turo/actions-jvm/lint@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          checkout-repo: true

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version-file: .java-version

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Spotless check
        run: ./gradlew spotlessCheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version-file: .java-version

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: generator/package-lock.json

      - name: Install lexicon corpus
        working-directory: generator
        run: |
          npm ci
          npx lex install --ci

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Runtime + generator tests
        run: ./gradlew :runtime:jvmTest :generator:test

      - name: Android sample unit tests
        run: ./gradlew :samples:android:testDebugUnitTest

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version-file: .java-version

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: generator/package-lock.json

      - name: Install lexicon corpus
        working-directory: generator
        run: |
          npm ci
          npx lex install --ci

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Compile library (JVM)
        run: ./gradlew :runtime:compileKotlinJvm :models:compileKotlinJvm

      - name: Build Android sample APK
        run: ./gradlew :samples:android:assembleDebug

  # ── Release + publish ─────────────────────────────────────────────
  # Only runs after all gate jobs pass. Semantic-release analyzes
  # commits, bumps version, tags, and runs `./gradlew publish` which
  # publishes to both GitHub Packages and Maven Central in one step.

  release:
    name: Release
    needs: [lint, test, build]
    runs-on: ubuntu-latest
    outputs:
      new-release-published: ${{ steps.release.outputs.new-release-published }}
      new-release-version: ${{ steps.release.outputs.new-release-version }}
    steps:
      # Pin to the live main HEAD rather than the triggering SHA. With the
      # concurrency group above, a queued run only starts after the previous
      # run has pushed its release + docs commits — ref: main ensures we
      # check those commits out so the docs push fast-forwards.
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.RELEASE_PAT }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: generator/package-lock.json

      - name: Install lexicon corpus
        working-directory: generator
        run: |
          npm ci
          npx lex install --ci

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version-file: .java-version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - id: release
        uses: open-turo/actions-jvm/release@v2
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}
        with:
          github-token: ${{ secrets.RELEASE_PAT }}
          checkout-repo: false

      # Regenerate API docs AFTER semantic-release bumps gradle.properties,
      # so the Dokka-embedded `library-version` label matches the just-published
      # artifacts. On non-release pushes (chore/docs/etc.), semantic-release is
      # a no-op and Dokka reads the current released version — still correct.
      - name: Generate API docs
        run: ./gradlew :generator:generateModels :dokkaGeneratePublicationHtml --no-configuration-cache

      - name: Stage API docs for GitHub Pages
        run: |
          rm -rf docs/api
          cp -r build/dokka/html docs/api

      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "docs: update API documentation [skip ci]"
          file_pattern: "docs/api/**"
