name: Release

on:
  # Manual trigger only for the first few runs — flip to `push: branches: [main]`
  # once we've verified the full flow end-to-end against real pushes.
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      # `open-turo/actions-jvm/release@v2` wraps semantic-release with the
      # `gradle-semantic-release-plugin`, which ALSO handles publishing —
      # its `publish` step invokes `./gradlew publish -q` after bumping
      # `gradle.properties` and creating the git tag. The `publish` task
      # is a Gradle lifecycle that runs every `publishXxxToGitHubPackagesRepository`
      # task configured by `:at-protocol-runtime` and `:at-protocol-models`.
      # So this single step does everything: commit analysis, version
      # bump, git tag, GitHub release, and GitHub Packages upload.
      #
      # Required env:
      # - RELEASE_PAT: fine-grained PAT with `contents:write`,
      #   `pull-requests:write`, `actions:read`. Configured as a repo
      #   secret. Used by semantic-release to push the version-bump
      #   commit and create the tag.
      # - GITHUB_TOKEN: auto-provisioned, grants `packages:write` via
      #   the `permissions` block above. Used by `./gradlew publish` to
      #   authenticate against `maven.pkg.github.com`.
      # - GITHUB_ACTOR: auto-provisioned, the user who triggered the
      #   workflow. Used as the GitHub Packages Maven basic-auth
      #   username.
      - id: release
        uses: open-turo/actions-jvm/release@v2
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          github-token: ${{ secrets.RELEASE_PAT }}
          checkout-repo: true
