name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  # ── Gate jobs ──────────────────────────────────────────────────────
  # Mirror the lint/test/build checks from ci.yaml so no broken code
  # can reach the release + publish steps. Pattern from open-turo/nibel.

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Action lint
        uses: open-turo/actions-jvm/lint@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          checkout-repo: true

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version-file: .java-version

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Spotless check
        run: ./gradlew spotlessCheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version-file: .java-version

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: at-protocol-generator/package-lock.json

      - name: Install lexicon corpus
        working-directory: at-protocol-generator
        run: |
          npm ci
          npx lex install --ci

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Runtime + generator tests
        run: ./gradlew :at-protocol-runtime:jvmTest :at-protocol-generator:test

      - name: Android sample unit tests
        run: ./gradlew :samples:android:testDebugUnitTest

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version-file: .java-version

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: at-protocol-generator/package-lock.json

      - name: Install lexicon corpus
        working-directory: at-protocol-generator
        run: |
          npm ci
          npx lex install --ci

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Compile library (JVM)
        run: ./gradlew :at-protocol-runtime:compileKotlinJvm :at-protocol-models:compileKotlinJvm

      - name: Build Android sample APK
        run: ./gradlew :samples:android:assembleDebug

  # ── Release + publish ─────────────────────────────────────────────
  # Only runs after all gate jobs pass. Semantic-release analyzes
  # commits, bumps version, tags, and runs `./gradlew publish` which
  # publishes to both GitHub Packages and Maven Central in one step.

  release:
    name: Release
    needs: [lint, test, build]
    runs-on: ubuntu-latest
    outputs:
      new-release-published: ${{ steps.release.outputs.new-release-published }}
      new-release-version: ${{ steps.release.outputs.new-release-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: at-protocol-generator/package-lock.json

      - name: Install lexicon corpus
        working-directory: at-protocol-generator
        run: |
          npm ci
          npx lex install --ci

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version-file: .java-version

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Generate API docs
        run: ./gradlew :dokkaGeneratePublicationHtml --no-configuration-cache

      - name: Stage API docs for GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf docs/api
          cp -r build/dokka/html docs/api
          git add docs/api
          git diff --staged --quiet || git commit -m "docs: update API documentation [skip ci]"

      - id: release
        uses: open-turo/actions-jvm/release@v2
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}
        with:
          github-token: ${{ secrets.RELEASE_PAT }}
          checkout-repo: false
