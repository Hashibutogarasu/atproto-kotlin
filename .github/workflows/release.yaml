name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      new-release-published: ${{ steps.release.outputs.new-release-published }}
      new-release-version: ${{ steps.release.outputs.new-release-version }}
    steps:
      # We do our own checkout (instead of letting open-turo do it) so
      # we can install the lexicon corpus BEFORE semantic-release's
      # embedded `./gradlew publish -q` runs. Without the lexicons,
      # `:at-protocol-models:generateModels` skips and the published
      # models jar is empty.
      #
      # `fetch-depth: 0` gives semantic-release the full commit + tag
      # history it needs for commit analysis. `token` is the RELEASE_PAT
      # so semantic-release can push the version-bump commit + tag back.
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: at-protocol-generator/package-lock.json

      - name: Install lexicon corpus
        working-directory: at-protocol-generator
        run: |
          npm ci
          npx lex install --ci

      - id: release
        uses: open-turo/actions-jvm/release@v2
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}
        with:
          github-token: ${{ secrets.RELEASE_PAT }}
          # Skip the action's internal checkout — we already checked out
          # above with full history + PAT + lexicon corpus installed.
          checkout-repo: false

  publish-to-central:
    name: Publish to Maven Central
    needs: release
    if: needs.release.outputs.new-release-published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: v${{ needs.release.outputs.new-release-version }}

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version-file: .java-version

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: at-protocol-generator/package-lock.json

      - name: Install lexicon corpus
        working-directory: at-protocol-generator
        run: |
          npm ci
          npx lex install --ci

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      # --no-build-cache prevents a stale empty-jar from the release
      # job's runner from being reused — forces a full recompile from
      # the freshly-generated lexicon sources. Adds ~30s of compile
      # overhead per release but guarantees the Central bundle contains
      # the actual generated classes, not a cached empty jar.
      - name: Publish to Maven Central (user-managed)
        run: ./gradlew publishToMavenCentral --no-configuration-cache --no-build-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}
