name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # Outputs are consumed by the downstream `publish-to-central` job so
    # we only upload to Maven Central when semantic-release actually cuts
    # a new version. `chore:` / `ci:` / `docs:` / `test:` / `refactor:`
    # commits leave these unset and the central job no-ops.
    outputs:
      new-release-published: ${{ steps.release.outputs.new-release-published }}
      new-release-version: ${{ steps.release.outputs.new-release-version }}
    steps:
      # `open-turo/actions-jvm/release@v2` wraps semantic-release with the
      # `gradle-semantic-release-plugin`, which runs `./gradlew publish -q`
      # against the secondary `GitHubPackages` maven repository declared
      # in each library module. So this single step: analyzes commits,
      # bumps `gradle.properties`, tags, creates a GitHub release, AND
      # publishes the new version to GitHub Packages.
      #
      # The subsequent `publish-to-central` job then uploads the same
      # version to Maven Central via `./gradlew publishToMavenCentral`
      # (the vanniktech plugin's task). Central and GitHub Packages are
      # published from distinct task graphs — no 409 race.
      - id: release
        uses: open-turo/actions-jvm/release@v2
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The vanniktech plugin's `prepareMavenCentralPublishing` task
          # runs as part of the standard `publish` lifecycle (before any
          # network call) to validate that Central credentials exist
          # up-front. Even though the actual Central bundle upload
          # happens in the downstream `publish-to-central` job, these
          # env vars must be set here so the release job's embedded
          # `./gradlew publish -q` call passes validation. Without them,
          # the whole release step fails at `prepareMavenCentralPublishing`
          # and no GitHub Packages upload happens either.
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}
        with:
          github-token: ${{ secrets.RELEASE_PAT }}
          checkout-repo: true

  publish-to-central:
    name: Publish to Maven Central
    needs: release
    if: needs.release.outputs.new-release-published == 'true'
    runs-on: ubuntu-latest
    steps:
      # Check out main at HEAD — the previous job just pushed the
      # release commit that bumped `gradle.properties` to the new
      # version, so `project.version` reads correctly at publish time.
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version-file: .java-version

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: at-protocol-generator/package-lock.json

      # Restore the pinned lexicon corpus so `:at-protocol-models` has
      # its generator input. Same step as ci.yaml — the corpus is
      # gitignored and restored from CID pins in `lexicons.json`.
      - name: Install lexicon corpus
        working-directory: at-protocol-generator
        run: |
          npm ci
          npx lex install --ci

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      # `publishToMavenCentral` (NOT `publishAndReleaseToMavenCentral`)
      # uploads the bundle to Central Portal and leaves it in the
      # USER_MANAGED "pending release" state. You review and click
      # "Release" in the Central Portal UI before the version propagates
      # to `repo1.maven.org`. Flip to `publishAndReleaseToMavenCentral`
      # in `mavenPublishing { publishToMavenCentral(..., automaticRelease = true) }`
      # once the pipeline has proven itself over a few cycles.
      #
      # Credentials are injected as Gradle project properties via the
      # `ORG_GRADLE_PROJECT_*` env convention. The vanniktech plugin
      # picks them up automatically:
      #   - mavenCentralUsername / mavenCentralPassword: Central Portal
      #     User Token (generated at central.sonatype.com → View Account)
      #   - signingInMemoryKey: base64-encoded GPG private key (from
      #     `gpg --export-secret-keys --armor | base64`)
      #   - signingInMemoryKeyPassword: GPG key passphrase
      - name: Publish to Maven Central (user-managed)
        run: ./gradlew publishToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.GPG_SIGNING_PASSWORD }}
