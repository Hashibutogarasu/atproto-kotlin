# Pre-commit config. Install once with: `pre-commit install && pre-commit install --hook-type commit-msg`
# Run across the whole repo with: `pre-commit run --all-files`

# Paths that pre-commit should never touch. The generator's installed lexicon
# corpus and its manifest, the generated Kotlin sources, node_modules, and
# gradle build dirs are all machine-managed and shouldn't be rewritten by
# formatters. lexicons.json in particular is emitted by `npx lex install`
# (run by .github/workflows/lexicon-bump.yaml); its format is owned upstream
# by @atproto/lex and validated downstream by :generator:generateModels.
exclude: |
  (?x)^(
    generator/lexicons/.*|
    generator/lexicons\.json|
    generator/node_modules/.*|
    generator/package-lock\.json|
    models/build/.*|
    .*/build/.*|
    .*/\.gradle/.*|
    docs/api/.*
  )$

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-json
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
        # api/*.api dumps from kotlinx-binary-compatibility-validator scale
        # with the published API surface. :models in particular tracks every
        # generated lexicon type, so its dump is intentionally large (~900 KB).
        exclude: '^[^/]+/api/.*\.api$'
      - id: end-of-file-fixer
        # apiDump from kotlinx-binary-compatibility-validator emits one
        # trailing blank line after the final closing brace. This hook
        # collapses that to a single newline, after which the next
        # apiCheck regenerates the blank and fails — so .api files have
        # to opt out of the normalization.
        exclude: '^[^/]+/api/.*\.api$'
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: ["--fix=lf"]
        # Windows batch files (notably gradlew.bat) must retain CRLF or
        # they break on Windows. Everything else normalizes to LF.
        exclude: '\.bat$'

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.25.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ["@commitlint/config-conventional"]

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # Spotless + ktlint runs via the existing Gradle wiring so the config lives
  # in one place (build.gradle.kts). pass_filenames is false because Gradle's
  # spotless task already knows what to lint — we just re-trigger it when any
  # Kotlin source or build script changes.
  - repo: local
    hooks:
      - id: spotless
        name: spotless (ktlint)
        entry: ./gradlew spotlessApply
        language: system
        files: '\.(kt|kts)$'
        pass_filenames: false
